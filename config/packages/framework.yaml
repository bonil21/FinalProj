# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session:
        # Use secure defaults while keeping local development stable.
        cookie_samesite: 'lax'
        cookie_secure: auto
        cookie_httponly: true
        cookie_domain: null

    #esi: true
    #fragments: true

when@dev:
    framework:
        session:
            cookie_samesite: 'lax'
            cookie_secure: auto
            cookie_httponly: true
            cookie_domain: null

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
